/* Compression photo : carré 900×900, image ENTIÈRE centrée sur fond blanc
   (jamais coupée ni zoomée), ~80-250 Ko, stockée avec l'article */
const compresserPhoto = (fichier) => new Promise((resoudre, rejeter) => {
  const img = new Image();
  const url = URL.createObjectURL(fichier);
  img.onload = () => {
    const cote = 900;
    const c = document.createElement("canvas");
    c.width = cote; c.height = cote;
    const ctx = c.getContext("2d");
    ctx.fillStyle = "#FFFFFF";
    ctx.fillRect(0, 0, cote, cote);
    const k = Math.min(cote / img.width, cote / img.height);
    const w = img.width * k, h = img.height * k;
    ctx.drawImage(img, (cote - w) / 2, (cote - h) / 2, w, h);
    let sortie = c.toDataURL("image/jpeg", 0.68);
    if (sortie.length > 350000) sortie = c.toDataURL("image/jpeg", 0.5);
    URL.revokeObjectURL(url);
    resoudre(sortie);
  };
  img.onerror = () => { URL.revokeObjectURL(url); rejeter(new Error("Photo illisible")); };
  img.src = url;
});

const chargerImage = (src) => new Promise((res, rej) => {
  const i = new Image(); i.onload = () => res(i); i.onerror = rej; i.src = src;
});

const arrondiCanvas = (ctx, x, y, w, h, r) => {
  ctx.beginPath(); ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r); ctx.arcTo(x, y, x + w, y, r); ctx.closePath();
};

const ecrireCentre = (ctx, texte, x, y, maxL, interligne) => {
  const mots = (texte || "").split(" ");
  let ligne = "", yy = y;
  mots.forEach((m) => {
    const t = ligne ? ligne + " " + m : m;
    if (ctx.measureText(t).width > maxL && ligne) { ctx.fillText(ligne, x, yy); yy += interligne; ligne = m; }
    else ligne = t;
  });
  if (ligne) { ctx.fillText(ligne, x, yy); yy += interligne; }
  return yy;
};

async function dessinerPost(v, photosSrc, textes) {
  await document.fonts.load("700 80px Caveat");
  await document.fonts.load("300 30px Poppins");
  await document.fonts.load("600 28px Poppins");
  const T = 1080, hB = 300;
  const c = document.createElement("canvas");
  c.width = T; c.height = T;
  const ctx = c.getContext("2d");
  ctx.fillStyle = "#FFFDF8"; ctx.fillRect(0, 0, T, T);

  const superpose = v.position === "superpose";
  const photosY = v.position === "haut" ? hB : 0;
  const zone = superpose
    ? { x: 0, y: 0, w: T, h: T, r: 0 }
    : { x: 14, y: photosY + 14, w: T - 28, h: T - hB - 28, r: 18 };

  const imgs = [];
  for (const s of photosSrc) imgs.push(s ? await chargerImage(s) : null);
  const teintes = v.palette.photos;

  const casePhoto = (x, y, w, h, i) => {
    ctx.save();
    arrondiCanvas(ctx, x, y, w, h, zone.r); ctx.clip();
    const img = imgs[i];
    if (img) {
      const k = Math.max(w / img.width, h / img.height);
      ctx.drawImage(img, x + (w - img.width * k) / 2, y + (h - img.height * k) / 2, img.width * k, img.height * k);
    } else {
      ctx.fillStyle = teintes[i % 2]; ctx.fillRect(x, y, w, h);
      ctx.font = Math.round(Math.min(w, h) * 0.32) + "px sans-serif";
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText(v.emojis[i % v.emojis.length], x + w / 2, y + h / 2);
      ctx.textBaseline = "alphabetic";
    }
    ctx.restore();
  };

  const g = 14;
  if (v.gabarit === "tambour") {
    const cx = T / 2, cy = zone.y + zone.h / 2, R = Math.min(zone.h, 640) / 2 - 30;
    ctx.save(); ctx.beginPath(); ctx.arc(cx, cy, R, 0, 7); ctx.clip();
    const img = imgs[0];
    if (img) {
      const k = Math.max((2 * R) / img.width, (2 * R) / img.height);
      ctx.drawImage(img, cx - img.width * k / 2, cy - img.height * k / 2, img.width * k, img.height * k);
    } else {
      ctx.fillStyle = teintes[0]; ctx.fillRect(cx - R, cy - R, 2 * R, 2 * R);
      ctx.font = "180px sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText(v.emojis[0], cx, cy); ctx.textBaseline = "alphabetic";
    }
    ctx.restore();
    ctx.lineWidth = 26; ctx.strokeStyle = "#C89B6A";
    ctx.beginPath(); ctx.arc(cx, cy, R + 14, 0, 7); ctx.stroke();
    ctx.lineWidth = 7; ctx.strokeStyle = "#B0824F";
    ctx.beginPath(); ctx.arc(cx, cy, R - 2, 0, 7); ctx.stroke();
    ctx.fillStyle = "#B0824F"; ctx.fillRect(cx - 15, cy - R - 56, 30, 34);
  } else if (v.gabarit === "g1") {
    casePhoto(zone.x, zone.y, zone.w, zone.h, 0);
  } else if (v.gabarit === "g2") {
    const w = (zone.w - g) / 2;
    casePhoto(zone.x, zone.y, w, zone.h, 0); casePhoto(zone.x + w + g, zone.y, w, zone.h, 1);
  } else if (v.gabarit === "g3") {
    const w1 = (zone.w - g) * 2 / 3, w2 = zone.w - g - w1, h2 = (zone.h - g) / 2;
    casePhoto(zone.x, zone.y, w1, zone.h, 0);
    casePhoto(zone.x + w1 + g, zone.y, w2, h2, 1);
    casePhoto(zone.x + w1 + g, zone.y + h2 + g, w2, h2, 2);
  } else {
    const w = (zone.w - g) / 2, h = (zone.h - g) / 2;
    casePhoto(zone.x, zone.y, w, h, 0); casePhoto(zone.x + w + g, zone.y, w, h, 1);
    casePhoto(zone.x, zone.y + h + g, w, h, 2); casePhoto(zone.x + w + g, zone.y + h + g, w, h, 3);
  }

  const bandY = v.position === "haut" && !superpose ? 0 : T - hB;
  ctx.fillStyle = superpose ? "rgba(255,253,248,0.93)" : v.palette.bandeau;
  ctx.fillRect(0, bandY, T, hB);

  ctx.textAlign = "center";
  let ty = bandY + 88;
  ctx.fillStyle = "#6D071A"; ctx.font = "700 74px Caveat";
  ctx.fillText(v.emoji + " " + (textes.h || ""), T / 2, ty);
  ctx.font = "300 30px Poppins"; ctx.fillStyle = "#5E5257";
  ty = ecrireCentre(ctx, textes.p, T / 2, ty + 50, 880, 40);
  if (textes.cta) {
    ctx.font = "600 28px Poppins";
    const w = ctx.measureText(textes.cta).width + 60;
    arrondiCanvas(ctx, T / 2 - w / 2, ty - 12, w, 58, 29);
    ctx.fillStyle = "#6D071A"; ctx.fill();
    ctx.fillStyle = "#FFFFFF"; ctx.fillText(textes.cta, T / 2, ty + 26);
  }

  if (v.pointille) {
    ctx.strokeStyle = "rgba(109,7,26,0.4)"; ctx.lineWidth = 3;
    ctx.setLineDash([13, 11]); ctx.strokeRect(24, 24, T - 48, T - 48); ctx.setLineDash([]);
  }

  ctx.textAlign = "left";
  ctx.font = "700 46px Caveat";
  let wPil = ctx.measureText("Nath Point Brod ☺").width + 44;
  arrondiCanvas(ctx, 26, 26, wPil, 66, 33);
  ctx.fillStyle = "rgba(255,253,248,0.93)"; ctx.fill();
  ctx.fillStyle = "#6D071A"; ctx.fillText("Nath Point Brod ", 48, 72);
  ctx.fillStyle = "#E3C400"; ctx.fillText("☺", 48 + ctx.measureText("Nath Point Brod ").width, 72);
  ctx.fillStyle = "#6D071A"; ctx.font = "600 19px Poppins";
  const sousTxt = "B R O D E R I E   P E R S O N N A L I S É E";
  wPil = ctx.measureText(sousTxt).width + 36;
  arrondiCanvas(ctx, 26, 102, wPil, 36, 18);
  ctx.fillStyle = "rgba(255,253,248,0.9)"; ctx.fill();
  ctx.fillStyle = "#6D071A"; ctx.fillText(sousTxt, 44, 127);
  ctx.textAlign = "center";

  return c.toDataURL("image/png");
}

function ApercuPost({ v, photos, textes, grand }) {
  const nb = NB_PHOTOS_TPL[v.gabarit];
  const cases = [];
  for (let i = 0; i < nb; i++) {
    const src = photos && photos[i];
    cases.push(
      <div key={i} className="tpl-ph" style={src ? {} : { background: v.palette.photos[i % 2] }}>
        {src ? <img src={src} alt="" /> : <span>{v.emojis[i % v.emojis.length]}</span>}
      </div>
    );
  }
  const zone = v.gabarit === "tambour"
    ? <div className="tpl-tambour-wrap"><div className="tpl-tambour">{cases}</div></div>
    : <div className={"tpl-photos " + v.gabarit}>{cases}</div>;
  const bandeau = (
    <div className="tpl-bandeau" style={{ background: v.position === "superpose" ? "rgba(255,253,248,0.93)" : v.palette.bandeau }}>
      <h3>{v.emoji} {textes.h}</h3>
      <p>{textes.p}</p>
      {textes.cta ? <span className="tpl-cta">{textes.cta}</span> : null}
    </div>
  );
  return (
    <div className={"tpl-post " + v.position + (v.pointille ? " pointille" : "") + (grand ? " grand" : "")}>
      <div className="tpl-logo">Nath Point Brod<em>☺</em></div>

      {v.position === "haut" ? <>{bandeau}{zone}</> : <>{zone}{bandeau}</>}

  );
}

  );

  /* ---------- boutique ---------- */
  const [filtre, setFiltre] = useState("Tout");

  const [nlMessage, setNlMessage] = useState("Bonjour ! Voici quelques pièces sorties de l’atelier récemment — toutes brodées ici, toutes uniques. Un coup de cœur ? Elles sont à retrouver sur la boutique.");
  const [nlSel, setNlSel] = useState(null); // null = sélection par défaut (30 derniers jours)

  const [nvOcc, setNvOcc] = useState(null);
  const [nvVariantes, setNvVariantes] = useState([]);
  const [nvChoix, setNvChoix] = useState(null);
  const [nvTextes, setNvTextes] = useState({ h: "", p: "", cta: "" });
  const [nvPhotos, setNvPhotos] = useState([]);
  const [generationEnCours, setGenerationEnCours] = useState(false);

  /* ---------- pièce en cours ---------- */
  const [nomPiece, setNomPiece] = useState("");
  const [categorie, setCategorie] = useState(CONFIG_DEFAUT.categories[0]);
  const [dimsArticle, setDimsArticle] = useState("");
  const [tissuNom, setTissuNom] = useState("");
  const [dims, setDims] = useState({ largeur: 40, hauteur: 26 });
  const [accUsage, setAccUsage] = useState({});
  const [brod, setBrod] = useState({ bobine: "Bobine 1000 m", points: 8000, largeur: 8, hauteur: 6, consoSup: 5, consoCan: 3.5 });
  const [intisseUsage, setIntisseUsage] = useState({});
  const [margePct, setMargePct] = useState(40);
  const [formCat, setFormCat] = useState(null);
  const [formTissu, setFormTissu] = useState(null);
  const [formAcc, setFormAcc] = useState(null);
  const [formIntisse, setFormIntisse] = useState(null);

  /* ---------- calculs du chiffrage ---------- */
  const tissuSel = tissusRef.find((t) => t.nom === tissuNom) || tissusRef[0];
  const surfaceM2 = ((dims.largeur || 0) / 100) * ((dims.hauteur || 0) / 100);
  const coutTissu = tissuSel ? surfaceM2 * (tissuSel.prixMetre / (tissuSel.laize / 100)) : 0;
  const coutAccessoires = Object.entries(accUsage).reduce((s, [nom, q]) => {
    const a = accRef.find((x) => x.nom === nom);
    return !a || !q ? s : s + (a.mode === "piece" ? q * a.prix : (q / 100) * a.prix);
  }, 0);
  const bobineSel = bobinesRef.find((b) => b.nom === brod.bobine) || bobinesRef[0];
  const prixMetreFil = bobineSel ? bobineSel.prix / bobineSel.longueur : 0;
  const prixMetreCanette = canette.longueur ? canette.prix / canette.longueur : 0;
  const metresFilSup = ((brod.points || 0) / 1000) * (brod.consoSup || 0);
  const metresFilCan = ((brod.points || 0) / 1000) * (brod.consoCan || 0);
  const coutFil = metresFilSup * prixMetreFil + metresFilCan * prixMetreCanette;
  const coutIntisses = Object.entries(intisseUsage).reduce((s, [nom, cm]) => {
    const i = intisseRef.find((x) => x.nom === nom);
    return i && cm ? s + (cm / 100) * i.prixMetre : s;
  }, 0);
  const minutesBroderie = (brod.points || 0) / VITESSE_BRODERIE;
  const minutesTotal = minutesBroderie + (charges.confectionMin || 0);
  const heures = minutesTotal / 60;
  const coutSalaire = heures * (charges.salaire || 0);
  const coutMachine = heures * ((charges.electricite || 0) + (charges.usure || 0));
  const coutRevient = coutTissu + coutAccessoires + coutFil + coutIntisses + coutSalaire + coutMachine;
  const prixAvantUrssaf = margePct < 100 ? coutRevient / (1 - margePct / 100) : coutRevient;
  const prixFinal = urssafPct < 100 ? prixAvantUrssaf / (1 - urssafPct / 100) : prixAvantUrssaf;

  const ajouterPhoto = (article, fichier) => {
    compresserPhoto(fichier).then((base64) => {
      const photos = [...(article.photos || (article.photo ? [article.photo] : [])), base64];

      db.collection("articles").doc(article.id).update({ photos, photo: photos[0] })
        .then(() => montrerToast("Photo ajoutée (" + tailleKo(base64) + " Ko)"))
        .catch((e) => montrerToast("Erreur : " + e.message));
    }).catch((e) => montrerToast("Photo : " + e.message));
  };

  const retirerPhoto = (article, index) => {
    const photos = (article.photos || []).filter((_, i) => i !== index);
    db.collection("articles").doc(article.id).update({ photos, photo: photos[0] || null })

  const ajouterPhotoBase64 = (articleId, base64) => {
    const article = articles.find((x) => x.id === articleId);

  const ouvrirRecadrage = (article, fichier) => {
    const src = URL.createObjectURL(fichier);
    const img = new Image();
    img.onload = () => setRecadrage({ articleId: article.id, src, w: img.width, h: img.height, zoom: 1, x: null, y: null });
    img.onerror = () => { URL.revokeObjectURL(src); montrerToast("Photo illisible"); };

  };

  const ouvrirRecadrageLocal = (slot, fichier) => {
    const src = URL.createObjectURL(fichier);
    const img = new Image();
    img.onload = () => setRecadrage({ slot, src, w: img.width, h: img.height, zoom: 1, x: null, y: null });
    img.onerror = () => { URL.revokeObjectURL(src); montrerToast("Photo illisible"); };
    img.src = src;
  };

  const validerRecadrage = (entiere) => {
    const r = recadrage;
    const img = new Image();
    img.onload = () => {
      const cote = 900;
      const c = document.createElement("canvas");
      c.width = cote; c.height = cote;
      const ctx = c.getContext("2d");
      ctx.fillStyle = "#FFFFFF";
      ctx.fillRect(0, 0, cote, cote);
      if (entiere) {
        const k = Math.min(cote / r.w, cote / r.h);
        ctx.drawImage(img, (cote - r.w * k) / 2, (cote - r.h * k) / 2, r.w * k, r.h * k);
      } else {
        const S = 300, F = cote / S;
        const echelle = (S / Math.min(r.w, r.h)) * r.zoom;
        const dw = r.w * echelle, dh = r.h * echelle;
        const x = r.x === null ? (S - dw) / 2 : r.x;
        const y = r.y === null ? (S - dh) / 2 : r.y;
        ctx.drawImage(img, x * F, y * F, dw * F, dh * F);
      }
      let sortie = c.toDataURL("image/jpeg", 0.68);
      if (sortie.length > 350000) sortie = c.toDataURL("image/jpeg", 0.5);
      URL.revokeObjectURL(r.src);
      if (r.articleId) {
        ajouterPhotoBase64(r.articleId, sortie);
      } else {
        setNvPhotos((prev) => {
          const next = [...prev];
          next[r.slot] = sortie;
          return next;
        });
      }
      setRecadrage(null);
    };
    img.src = r.src;
  };

  const publier = (article) => {
    db.collection("articles").doc(article.id).update({ statut: "publié", datePub: Date.now() })
      .then(() => montrerToast(article.ref + " publié — visible en boutique"))
      .catch((e) => montrerToast("Erreur : " + e.message));
  };

  const vendre = (article, canal) => {
    db.collection("articles").doc(article.id).update({ statut: "vendu", canal })
      .then(() => { setCanalPour(null); montrerToast(article.ref + " vendu (" + canal.toLowerCase() + ")"); })
      .catch((e) => montrerToast("Erreur : " + e.message));
  };

  const supprimerArticle = (article) => {
    if (!window.confirm("Supprimer définitivement « " + article.nom + " » (" + article.ref + ") ?")) return;
    db.collection("articles").doc(article.id).delete()
      .then(() => montrerToast(article.ref + " supprimé"))
      .catch((e) => montrerToast("Erreur : " + e.message));
  };

  const confirmerResa = () => {
    if (!form.nomF.trim() || !form.prenom.trim() || !form.tel.trim() || !form.email.includes("@")) {
      setErreur("Merci de remplir nom, prénom, téléphone et email."); return;
    }
    if (!form.retrait) { setErreur("Choisissez un lieu de retrait."); return; }
    setEnvoiEnCours(true);
    const artDoc = db.collection("articles").doc(resaPour.id);
    const resDoc = db.collection("reservations").doc();
    const quand = Date.now();
    db.runTransaction((t) => t.get(artDoc).then((s) => {
      if (!s.exists || s.data().statut !== "publié") throw new Error("Cette pièce vient d" + "'" + "être réservée par quelqu" + "'" + "un d" + "'" + "autre.");
      t.update(artDoc, { statut: "réservé" });
      t.set(resDoc, {
        articleId: resaPour.id, articleRef: resaPour.ref, articleNom: resaPour.nom, prix: resaPour.prix,
        nomF: form.nomF.trim(), prenom: form.prenom.trim(), tel: form.tel.trim(), email: form.email.trim(),
        nlOk: form.nlOk, retrait: form.retrait, quand, dateLimite: quand + DUREE_RESA_JOURS * 86400000,
      });
    })).then(() => {
      if (form.nlOk) {
        const idContact = form.email.trim().toLowerCase().replace(/[\/#?\[\]]/g, "_");
        db.collection("contacts").doc(idContact)
          .set({ email: form.email.trim().toLowerCase(), prenom: form.prenom.trim(), quand })
          .catch(() => {}); // adresse déjà connue : rien à faire
      }
      if (!SERVICE_MAILS.includes("REMPLACE")) {
        fetch(SERVICE_MAILS + "/api/reservation", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ id: resDoc.id }),
        }).catch(() => {}); // l'email est un bonus : son échec ne bloque jamais la réservation
      }
      setConfirmation({ ...resaPour, quand });
      setResaPour(null); setFiche(null); setErreur("");
      setForm({ nomF: "", prenom: "", tel: "", email: "", nlOk: false, retrait: "" });
    }).catch((e) => setErreur(e.message))
      .finally(() => setEnvoiEnCours(false));
  };

  const traiterResa = (r, remise) => {
    const lot = db.batch();
    if (r.articleId) {
      lot.update(db.collection("articles").doc(r.articleId),
        remise ? { statut: "vendu", canal: "Réservation" } : { statut: "publié" });
    }
    lot.delete(db.collection("reservations").doc(r.id));
    lot.commit()
      .then(() => montrerToast(remise ? "Pièce remise — vente enregistrée" : "Réservation annulée — pièce de retour en boutique"))
      .catch((e) => montrerToast("Erreur : " + e.message));
  };

  const seConnecter = () => {
    setAuthErreur("");
    auth.signInWithEmailAndPassword(authForm.email.trim(), authForm.mdp)
      .catch(() => setAuthErreur("Email ou mot de passe incorrect."));
  };

  /* ---------- générateur de posts & newsletter ---------- */
  const tirerVariantes = (occ) => {
    const prochain = marchesAVenir[0];
    const remplacer = (s) => s
      .replace(/\[date\]/g, prochain ? dateFR(prochain.date) : "dimanche prochain")
      .replace(/\[lieu\]/g, prochain ? prochain.lieu : "au marché");
    const arr = [];
    for (let i = 0; i < 12; i++) {
      const t = auHasard(occ.titres);
      const gab = occ.tambour ? (Math.random() < 0.6 ? "tambour" : auHasard(GABARITS_TPL))
        : occ.g2 ? "g2" : auHasard(GABARITS_TPL);
      arr.push({
        gabarit: gab, palette: auHasard(PALETTES_TPL),
        position: gab === "tambour" ? "bas" : auHasard(POSITIONS_TPL),
        pointille: Math.random() < 0.35,
        emoji: occ.emoji, emojis: occ.emojis,
        titre: { h: remplacer(t.h), p: remplacer(t.p), cta: t.cta },
      });
    }
    return arr;
  };

  const ouvrirOccasion = (occ) => { setNvOcc(occ); setNvChoix(null); setNvVariantes(tirerVariantes(occ)); };
  const choisirVariante = (v) => {
    setNvChoix(v); setNvTextes({ ...v.titre });
    setNvPhotos(new Array(NB_PHOTOS_TPL[v.gabarit]).fill(null));
  };
  const telechargerPost = async () => {
    setGenerationEnCours(true);
    try {
      const url = await dessinerPost(nvChoix, nvPhotos, nvTextes);
      const a = document.createElement("a");
      a.href = url; a.download = "nathpointbrod-" + nvOcc.id + ".png"; a.click();
      montrerToast("Image téléchargée — prête pour les réseaux ☺");
    } catch (e) { montrerToast("Erreur : " + e.message); }
    finally { setGenerationEnCours(false); }
  };

  const piecesNewsletter = articles
    .filter((a) => (a.statut === "publié" || a.statut === "réservé") && a.photo)
    .sort((a, b) => (b.datePub || 0) - (a.datePub || 0));
  const selectionNl = nlSel || (() => {
    const defaut = {};
    piecesNewsletter.slice(0, 6).forEach((p) => { defaut[p.id] = true; });
    return defaut;
  })();

  const genererNlHTML = () => {
    const pieces = piecesNewsletter.filter((p) => selectionNl[p.id]);
    const cartes = pieces.map((p) =>
      '<td width="50%" style="padding:6px"><div style="background:#FFFDF8;border-radius:10px;overflow:hidden;text-align:center">' +
      '<img src="' + p.photo + '" width="100%" style="display:block" alt="" />' +
      '<div style="font:600 13px Arial;color:#3A3234;padding:8px 6px 2px">' + p.nom + "</div>" +
      '<div style="font:600 13px Arial;color:#6D071A;padding-bottom:10px">' + eur(p.prix) + "</div></div></td>"
    );
    let lignes = "";
    for (let i = 0; i < cartes.length; i += 2) {
      lignes += "<tr>" + cartes[i] + (cartes[i + 1] || "<td></td>") + "</tr>";
    }
    return '<div style="max-width:560px;margin:0 auto;background:#fff;font-family:Arial,sans-serif;color:#3A3234">' +
      '<div style="text-align:center;padding:18px 10px;border-bottom:2px dashed #6D071A">' +
      '<div style="font-size:26px;font-weight:bold;color:#6D071A">Nath Point Brod <span style="color:#F3D617">&#9786;</span></div>' +
      '<div style="font-size:10px;letter-spacing:3px;color:#6D071A">BRODERIE PERSONNALIS&Eacute;E</div></div>' +
      '<h2 style="text-align:center;color:#6D071A;font-size:22px;margin:16px 10px 6px">' + nlTitre + "</h2>" +
      '<p style="text-align:center;font-size:13px;line-height:1.6;color:#5E5257;margin:0 24px 12px">' + nlMessage + "</p>" +
      '<table width="100%" cellpadding="0" cellspacing="0">' + lignes + "</table>" +
      '<div style="text-align:center;margin:16px"><a href="' + window.location.origin + window.location.pathname +
      '" style="background:#6D071A;color:#fff;text-decoration:none;font:600 13px Arial;border-radius:999px;padding:10px 22px;display:inline-block">Voir toutes les cr&eacute;ations sur la boutique</a></div>' +
      '<p style="text-align:center;font-size:10px;color:#A09A8C;padding-bottom:16px">Vous recevez cet email car vous avez accept&eacute; la newsletter de Nath Point Brod. Pour vous d&eacute;sinscrire, r&eacute;pondez simplement &laquo;&nbsp;stop&nbsp;&raquo;.</p></div>';
  };

  const telechargerNl = () => {
    const blob = new Blob(["<!DOCTYPE html><html><head><meta charset='utf-8'></head><body style='margin:0;background:#F2EEE6;padding:14px'>" + genererNlHTML() + "</body></html>"], { type: "text/html" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob); a.download = "newsletter-nathpointbrod.html"; a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 3000);
    montrerToast("Newsletter téléchargée (.html)");
  };

  const copierNewsletter = async () => {
    const html = genererNlHTML();
    try {
      await navigator.clipboard.write([new ClipboardItem({
        "text/html": new Blob([html], { type: "text/html" }),
        "text/plain": new Blob([nlTitre + "\n\n" + nlMessage], { type: "text/plain" }),
      })]);
      montrerToast("Newsletter copiée — collez-la dans un nouvel email ☺");
    } catch (e) { telechargerNl(); }
  };

  const copierAdresses = () => {
    navigator.clipboard.writeText(contacts.map((c) => c.email).join(", "))
      .then(() => montrerToast(contacts.length + " adresse(s) copiée(s) — à coller en Cci"))
      .catch(() => montrerToast("Copie impossible sur ce navigateur"));
  };

  const publies = articles.filter((a) => a.statut === "publié" || a.statut === "réservé");
  const catsBoutique = ["Tout", ...new Set(publies.map((a) => a.categorie))];
  const visibles = filtre === "Tout" ? publies : publies.filter((a) => a.categorie === filtre);
  const marchesAVenir = marches.filter((m) => m.date >= AUJOURDHUI).sort((a, b) => a.date.localeCompare(b.date));
  const enAttente = articles.filter((a) => a.statut === "attente");

  /* ================================================================ */

  return (
    <div className="app">
      <style>{CSS}</style>

      {/* ================= CONNEXION ATELIER ================= */}
      {enAtelier && !utilisateur && (
        <main className="contenu pin-ecran">
          <Logo petit />
          <p className="aide" style={{ textAlign: "center", marginTop: 18 }}>Espace réservé à l’atelier.</p>
          <div style={{ maxWidth: 320, margin: "0 auto", textAlign: "left" }}>
            <label className="label">Email</label>
            <input className="champ" type="email" inputMode="email" autoFocus value={authForm.email}
              onChange={(e) => setAuthForm({ ...authForm, email: e.target.value })} />
            <label className="label">Mot de passe</label>
            <input className="champ" type="password" value={authForm.mdp}
              onChange={(e) => setAuthForm({ ...authForm, mdp: e.target.value })}
              onKeyDown={(e) => e.key === "Enter" && seConnecter()} />
            {authErreur && <div className="erreur">{authErreur}</div>}
            <button className="btn-principal" onClick={seConnecter}>Se connecter</button>
          </div>
          <button className="retour-lien" style={{ display: "block", margin: "18px auto 0" }}
            onClick={() => { window.location.hash = ""; }}>← Retour à la boutique</button>
        </main>
      )}

      {/* ================= BOUTIQUE ================= */}
      {!enAtelier && (
        <>
          <header className="entete"><Logo /></header>
          <div className="bandeau">
            Chaque pièce est unique et déjà confectionnée. Un coup de cœur&nbsp;?
            Réservez-la : elle est <strong>mise de côté 1 semaine</strong>, sans paiement en ligne.
          </div>

          {marchesAVenir.length > 0 && (
            <div className="marches-bloc">
              <div className="marches-titre">☀️ Retrouvez-nous prochainement</div>
              {marchesAVenir.map((m) => (
                <div key={m.id} className="marche-ligne">
                  <span className="marche-date">{dateFR(m.date)}</span>
                  <span className="marche-lieu">{m.lieu}</span>
                </div>
              ))}
            </div>
          )}

          <div className="chips">
            {catsBoutique.map((c) => (
              <button key={c} className={"chip" + (filtre === c ? " actif" : "")} onClick={() => setFiltre(c)}>{c}</button>
            ))}
          </div>

          <main className="grille">
            {chargement && <div className="vide-msg" style={{ gridColumn: "1 / -1" }}>Chargement de la boutique…</div>}
            {!chargement && visibles.length === 0 && (
              <div className="vide-msg" style={{ gridColumn: "1 / -1" }}>
                Les créations arrivent bientôt dans la boutique ☺<br />
                Retrouvez-nous en attendant sur les marchés et en magasin à Belley.
              </div>
            )}
            {visibles.map((a) => {
              const prise = a.statut === "réservé";
              return (
                <article key={a.id} className={"carte" + (prise ? " prise" : "")} onClick={() => { if (!prise) { setFiche(a); setPhotoIdx(0); } }}>
                  <div className="photo" style={{ background: a.fond }}>
                    {a.photo ? <img src={a.photo} alt="" className="photo-img" /> : <span>{a.emoji}</span>}
                    {prise && <div className="ruban">Réservée ☺</div>}
                  </div>
                  <div className="carte-corps">
                    <div className="carte-cat">{a.categorie}</div>
                    <div className="carte-nom">{a.nom}</div>
                    <div className="carte-dims">{a.dims}</div>
                    <div className="carte-pied">
                      <span className="prix">{eur(a.prix)}</span>
                      {!prise && <span className="voir">Voir ›</span>}
                    </div>
                  </div>
                </article>
              );
            })}
          </main>

          <footer className="pied">
            Retrait en atelier à Rossillon ou en magasin à Belley.<br />Nath Point Brod — artisan d’art ☺<br />
            <button className="lien-mentions" onClick={() => setMentionsOuvertes(true)}>Mentions légales & confidentialité</button>
          </footer>
        </>
      )}

      {/* ================= GESTION ================= */}
      {enAtelier && utilisateur && (
        <>
          <header className="entete">
            <Logo petit />
            <div className="barre-session">
              <span>{utilisateur.email}</span>
              <button className="retour-lien" onClick={() => window.location.hash = ""}>Voir la boutique</button>
              <button className="retour-lien" onClick={() => auth.signOut()}>Se déconnecter</button>
            </div>
          </header>
          <div className="onglets-g">
            {[["creer", "✂️ Créer"], ["publier", "📸 Publier" + (enAttente.length ? " (" + enAttente.length + ")" : "")],
              ["resa", "🎀 Résa (" + reservations.length + ")"], ["news", "💌 News"], ["marches", "☀️ Marchés"], ["stock", "📦 Stock"]].map(([id, titre]) => (
              <button key={id} className={"onglet-g" + (ongletG === id ? " actif" : "")}
                onClick={() => { setOngletG(id); setSousEcran("choix"); }}>{titre}</button>
            ))}
          </div>

          {/* ------ CRÉER ------ */}
          {ongletG === "creer" && sousEcran === "choix" && (
            <main className="contenu">
              <button className="grand-choix" onClick={nouvellePiece}>
                <span className="gc-titre">✂️ Nouvelle pièce</span>
                <span className="gc-texte">Je crée un modèle qui n’existe pas encore.</span>
              </button>
              <button className="grand-choix second" onClick={() => setSousEcran("modeles")}>
                <span className="gc-titre">📂 Pièce existante</span>
                <span className="gc-texte">Je refais un modèle déjà chiffré — tout est pré-rempli et modifiable.</span>
              </button>
            </main>
          )}

          {ongletG === "creer" && sousEcran === "modeles" && (
            <main className="contenu">
              <button className="retour-lien" onClick={() => setSousEcran("choix")}>← Retour</button>
              {articles.filter((a) => a.chiffrage).length === 0 ? (
                <div className="vide-msg">Aucune pièce chiffrée pour l’instant : créez une nouvelle pièce, elle apparaîtra ici dans sa catégorie.</div>
              ) : (
                [...new Set(articles.filter((a) => a.chiffrage).map((a) => a.categorie))].map((cat) => (
                  <section key={cat}>
                    <h3 className="titre-section">{cat}</h3>
                    {articles.filter((a) => a.chiffrage && a.categorie === cat).map((p) => (
                      <button key={p.id} className="modele-ligne" onClick={() => chargerPiece(p)}>
                        <span>{p.nom} · {eur(p.prix)}</span><span className="modele-fleche">›</span>
                      </button>
                    ))}
                  </section>
                ))
              )}
            </main>
          )}

          {ongletG === "creer" && sousEcran === "assistant" && (
            <main className="contenu">
              <div className="etapes">
                {ETAPES.map((e, i) => (
                  <button key={e} className={"etape" + (i === etape ? " actif" : i < etape ? " fait" : "")} onClick={() => setEtape(i)}>
                    <span className="etape-rond">{i < etape ? "✓" : i + 1}</span>
                    <span className="etape-nom">{e}</span>
                  </button>
                ))}
              </div>

              {etape === 0 && (
                <section>
                  <Champ label="Titre de la pièce (avec couleurs du biais et de la broderie)"
                    placeholder="ex. Bavoir éponge blanc, biais terracotta & broderie bordeaux"
                    value={nomPiece} onChange={(e) => setNomPiece(e.target.value)} />
                  <Champ label="Dimensions de l’article (affichées en boutique)" placeholder="ex. 28 × 40 cm"
                    value={dimsArticle} onChange={(e) => setDimsArticle(e.target.value)} />
                  <label className="label">Catégorie</label>
                  <div className="choix-grille">
                    {categories.map((c) => (
                      <span key={c} className={"choix-case avec-suppr" + (categorie === c ? " choisi" : "")} onClick={() => setCategorie(c)}>
                        {c}
                        <button className="mini-suppr" aria-label="Supprimer" onClick={(ev) => {
                          ev.stopPropagation();
                          if (!window.confirm("Supprimer la catégorie « " + c + " » de la liste ?")) return;
                          const next = categories.filter((x) => x !== c);
                          setCategories(next); persister("categories", next);
                          if (categorie === c) setCategorie(next[0] || "");
                        }}>✕</button>
                      </span>
                    ))}
                    <button className="choix-case ajout" onClick={() => setFormCat(formCat === null ? "" : null)}>+ Nouvelle</button>
                  </div>
                  {formCat !== null && (
                    <div className="ajout-form">
                      <input className="champ" placeholder="Nom de la catégorie" autoFocus value={formCat}
                        onChange={(e) => setFormCat(e.target.value)} />
                      <button className="btn-principal petit" onClick={() => {
                        if (!formCat.trim()) return;
                        const next = [...categories, formCat.trim()];
                        setCategories(next); persister("categories", next);
                        setCategorie(formCat.trim()); setFormCat(null);
                      }}>Ajouter</button>
                    </div>
                  )}
                </section>
              )}

              {etape === 1 && (
                <section>
                  <label className="label">Tissu utilisé</label>
                  <div className="choix-grille">
                    {tissusRef.map((t) => (
                      <span key={t.nom} className={"choix-case avec-suppr" + (tissuNom === t.nom ? " choisi" : "")} onClick={() => setTissuNom(t.nom)}>
                        {t.nom}
                        <button className="mini-suppr" aria-label="Supprimer" onClick={(ev) => {
                          ev.stopPropagation();
                          if (!window.confirm("Supprimer le tissu « " + t.nom + " » de la liste ?")) return;
                          const next = tissusRef.filter((x) => x.nom !== t.nom);
                          setTissusRef(next); persister("tissus", next);
                          if (tissuNom === t.nom) setTissuNom(next[0] ? next[0].nom : "");
                        }}>✕</button>
                      </span>
                    ))}
                    <button className="choix-case ajout" onClick={() => setFormTissu(formTissu ? null : { nom: "", prixMetre: "", laize: 140 })}>+ Nouveau tissu</button>
                  </div>
                  {formTissu && (
                    <div className="ajout-form colonne">
                      <input className="champ" placeholder="Nom du tissu" autoFocus value={formTissu.nom}
                        onChange={(e) => setFormTissu({ ...formTissu, nom: e.target.value })} />
                      <div className="deux-cols">
                        <Champ label="Prix" suffixe="€ / m" type="number" inputMode="decimal" value={formTissu.prixMetre}
                          onChange={(e) => setFormTissu({ ...formTissu, prixMetre: +e.target.value })} />
                        <Champ label="Laize" suffixe="cm" type="number" inputMode="numeric" value={formTissu.laize}
                          onChange={(e) => setFormTissu({ ...formTissu, laize: +e.target.value })} />
                      </div>
                      <button className="btn-principal petit" onClick={() => {
                        if (!formTissu.nom.trim() || !formTissu.prixMetre) return;
                        const next = [...tissusRef, { ...formTissu, nom: formTissu.nom.trim() }];
                        setTissusRef(next); persister("tissus", next);
                        setTissuNom(formTissu.nom.trim()); setFormTissu(null);
                      }}>Ajouter le tissu</button>
                    </div>
                  )}
                  {tissuSel && (
                    <div className="deux-cols">
                      <Champ label={"Prix — " + tissuSel.nom} suffixe="€ / m" type="number" inputMode="decimal" step="0.10"
                        value={tissuSel.prixMetre} onChange={(e) => {
                          const next = tissusRef.map((t) => t.nom === tissuSel.nom ? { ...t, prixMetre: +e.target.value } : t);
                          setTissusRef(next); persister("tissus", next);
                        }} />
                      <Champ label="Laize" suffixe="cm" type="number" inputMode="numeric"
                        value={tissuSel.laize} onChange={(e) => {
                          const next = tissusRef.map((t) => t.nom === tissuSel.nom ? { ...t, laize: +e.target.value } : t);
                          setTissusRef(next); persister("tissus", next);
                        }} />
                    </div>
                  )}
                  <label className="label">Dimensions du tissu découpé</label>
                  <div className="champ-ligne">
                    <input className="champ mini" type="number" inputMode="decimal" value={dims.largeur}
                      onChange={(e) => setDims({ ...dims, largeur: +e.target.value })} />
                    <span className="suffixe">×</span>
                    <input className="champ mini" type="number" inputMode="decimal" value={dims.hauteur}
                      onChange={(e) => setDims({ ...dims, hauteur: +e.target.value })} />
                    <span className="suffixe">cm — le calcul se fait tout seul</span>
                  </div>
                  <div className="sous-total">Tissu : <strong>{eur(coutTissu)}</strong></div>
                </section>
              )}

            <main className="contenu">
              <p className="aide">Vos marchés s’affichent sur la boutique et disparaissent tout seuls une fois la date passée.</p>
              <div className="deux-cols">
                <div className="champ-bloc">
                  <label className="label">Date</label>
                  <input className="champ" type="date" value={nvMarche.date}
                    onChange={(e) => setNvMarche({ ...nvMarche, date: e.target.value })} />
                </div>
                <div className="champ-bloc">
                  <label className="label">Lieu</label>
                  <input className="champ" placeholder="ex. Marché de Belley" value={nvMarche.lieu}
                    onChange={(e) => setNvMarche({ ...nvMarche, lieu: e.target.value })} />
                </div>
              </div>
              <button className="btn-principal" onClick={() => {
                if (!nvMarche.date || !nvMarche.lieu.trim()) return;
                db.collection("marches").add({ date: nvMarche.date, lieu: nvMarche.lieu.trim() })
                  .then(() => { setNvMarche({ date: "", lieu: "" }); montrerToast("Marché ajouté — visible sur la boutique"); })
                  .catch((e) => montrerToast("Erreur : " + e.message));
              }}>Ajouter ce marché</button>
              {[...marches].sort((a, b) => b.date.localeCompare(a.date)).map((m) => {
                const passe = m.date < AUJOURDHUI;
                return (
                  <div key={m.id} className={"ligne" + (passe ? " passe" : "")}>
                    <div className="ligne-infos">
                      <div className="ligne-nom">{m.lieu}</div>
                      <div className="ligne-detail">{dateFR(m.date)}{passe && " — passé, masqué de la boutique"}</div>
                    </div>
                    <button className="btn-suppr" onClick={() => db.collection("marches").doc(m.id).delete()}>✕</button>
                  </div>
                );
              })}
            </main>
          )}

          {/* ------ STOCK ------ */}
          {ongletG === "stock" && (
            <main className="contenu">
              <input className="champ" placeholder="🔍 Référence (ex. BEB-001) ou nom…" value={recherche}
                onChange={(e) => setRecherche(e.target.value)} />
              {(() => {
                const stockActif = articles.filter((a) => a.statut === "publié" || a.statut === "réservé");
                const compte = {};
                stockActif.forEach((a) => { compte[a.categorie] = (compte[a.categorie] || 0) + 1; });
                const q = recherche.trim().toLowerCase();
                const liste = stockActif.filter((a) => !q || a.ref.toLowerCase().includes(q) || a.nom.toLowerCase().includes(q));
                return (
                  <>
                    <div className="chips" style={{ padding: "10px 0 4px" }}>
                      <span className="chip actif">Tout ({stockActif.length})</span>
                      {Object.entries(compte).map(([c, n]) => <span key={c} className="chip">{c} ({n})</span>)}
                    </div>
                    {liste.map((a) => (
                      <div key={a.id} className="ligne">
                        <div className="photo-mini" style={{ background: a.fond }}>
                          {a.photo ? <img src={a.photo} alt="" className="photo-mini-img" /> : a.emoji}
                        </div>
                        <div className="ligne-infos">
                          <div className="ligne-nom">{a.nom}</div>
                          <div className="ligne-detail">
                            {eur(a.prix)} · {a.dims} · <span className="ref-badge">{a.ref}</span>
                            {a.statut === "réservé" && <span className="badge-resa"> réservé</span>}
                          </div>
                        </div>
                        <button className="btn-edit" aria-label="Modifier" onClick={() => {
                          setEditionId(a.id);
                          setEditForm({ nom: a.nom, dims: a.dims, prix: a.prix, categorie: a.categorie });
                        }}>✎</button>
                        {canalPour === a.id ? (
                          <div className="canaux">
                            {["Marché", "Magasin", "Site"].map((c) => (
                              <button key={c} className="canal" onClick={() => vendre(a, c)}>{c}</button>
                            ))}
                          </div>
                        ) : (
                          <button className="btn-vendu" onClick={() => setCanalPour(a.id)}>Vendu</button>
                        )}
                        <button className="btn-suppr" onClick={() => supprimerArticle(a)} aria-label="Supprimer">✕</button>
                      </div>
                    ))}
                  </>
                );
              })()}
            </main>
          )}
        </>
      )}

      {/* ================= FICHE ARTICLE ================= */}
      {fiche && !resaPour && (() => {
        const photosF = fiche.photos || (fiche.photo ? [fiche.photo] : []);
        const phActive = photosF[Math.min(photoIdx, photosF.length - 1)] || null;
        return (
          <div className="voile" onClick={() => setFiche(null)}>
            <div className="panneau" onClick={(e) => e.stopPropagation()}>
              <button className="fermer" onClick={() => setFiche(null)}>✕</button>
              <div className="photo grande" style={{ background: fiche.fond }}>
                {phActive ? <img src={phActive} alt="" className="photo-img" /> : <span>{fiche.emoji}</span>}
              </div>
              {photosF.length > 1 && (
                <div className="fiche-vignettes">
                  {photosF.map((ph, i) => (
                    <img key={i} src={ph} alt="" className={i === photoIdx ? "choisi" : ""} onClick={() => setPhotoIdx(i)} />
                  ))}
                </div>
              )}
              <div className="panneau-corps">
                <div className="carte-cat">{fiche.categorie}</div>
                <h2 className="panneau-nom">{fiche.nom}</h2>
                <div className="details">
                  <div className="detail-ligne"><span>Dimensions</span><span>{fiche.dims}</span></div>
                  <div className="detail-ligne"><span>Tissu</span><span>{fiche.tissu || "—"}</span></div>
                  <div className="detail-ligne"><span>Référence</span><span>{fiche.ref}</span></div>
                </div>
                <div className="panneau-pied">
                  <span className="prix grand">{eur(fiche.prix)}</span>
                  <button className="btn-principal petit" onClick={() => setResaPour(fiche)}>Réserver cette pièce</button>
                </div>
                <p className="note-resa">
                  Réservation gratuite : la pièce est <strong>mise de côté 1 semaine</strong> à compter d’aujourd’hui.
                  Règlement au retrait, en atelier à Rossillon ou en magasin à Belley.
                </p>
              </div>
            </div>
          </div>
        );
      })()}

      {/* ================= FORMULAIRE RÉSERVATION ================= */}
      {resaPour && (
        <div className="voile" onClick={() => !envoiEnCours && setResaPour(null)}>
          <div className="panneau" onClick={(e) => e.stopPropagation()}>
            <button className="fermer" onClick={() => setResaPour(null)}>✕</button>
            <div className="panneau-corps">
              <h2 className="panneau-nom">Réserver : {resaPour.nom}</h2>
              <p className="panneau-desc">{resaPour.dims} — {eur(resaPour.prix)}</p>
              <div className="deux-cols">
                <div className="champ-bloc">
                  <label className="label">Prénom *</label>
                  <input className="champ" autoFocus value={form.prenom} onChange={(e) => setForm({ ...form, prenom: e.target.value })} />
                </div>
                <div className="champ-bloc">
                  <label className="label">Nom *</label>
                  <input className="champ" value={form.nomF} onChange={(e) => setForm({ ...form, nomF: e.target.value })} />
                </div>
              </div>
              <label className="label">Téléphone *</label>
              <input className="champ" type="tel" inputMode="tel" placeholder="06 12 34 56 78" value={form.tel}
                onChange={(e) => setForm({ ...form, tel: e.target.value })} />
              <label className="label">Email *</label>
              <input className="champ" type="email" inputMode="email" placeholder="vous@exemple.fr" value={form.email}
                onChange={(e) => setForm({ ...form, email: e.target.value })} />
              <label className="label">Retrait de la pièce *</label>
              <div className="retraits">
                {["En atelier à Rossillon", "En magasin à Belley"].map((r) => (
                  <button key={r} className={"retrait" + (form.retrait === r ? " choisi" : "")}
                    onClick={() => setForm({ ...form, retrait: r })}>{r}</button>
                ))}
              </div>
              <div className="encart-duree">
                ⏳ Votre pièce est mise de côté <strong>1 semaine</strong> à compter d’aujourd’hui —
                jusqu’au <strong>{limiteResa(Date.now())}</strong>. Passé ce délai, elle est remise en boutique.
              </div>
              <label className="case">
                <input type="checkbox" checked={form.nlOk} onChange={(e) => setForm({ ...form, nlOk: e.target.checked })} />
                <span>J’accepte de recevoir la newsletter des nouveautés de Nath Point Brod (1 email par mois environ).</span>
              </label>
              {erreur && <div className="erreur">{erreur}</div>}
              <button className="btn-principal" disabled={envoiEnCours} onClick={confirmerResa}>
                {envoiEnCours ? "Réservation en cours…" : "Confirmer la réservation"}
              </button>
              <p className="note-resa">Aucun paiement en ligne : la pièce est simplement mise de côté pour vous.</p>
            </div>
          </div>
        </div>
      )}

      {/* ================= CONFIRMATION ================= */}
      {confirmation && (
        <div className="voile" onClick={() => setConfirmation(null)}>
          <div className="panneau confirmation" onClick={(e) => e.stopPropagation()}>
            <div className="conf-icone">☺</div>
            <h2 className="panneau-nom centre">C’est réservé !</h2>
            <p className="panneau-desc centre">
              Votre pièce est mise de côté jusqu’au <strong>{limiteResa(confirmation.quand)}</strong>.
              Nath vous recontacte pour convenir du retrait ☺
            </p>
            <button className="btn-principal" onClick={() => setConfirmation(null)}>Continuer la visite</button>
          </div>
        </div>
      )}

      {/* ================= MODIFIER UN ARTICLE ================= */}
      {editionId && (() => {
        const art = articles.find((xx) => xx.id === editionId);
        if (!art) return null;
        const photos = art.photos || (art.photo ? [art.photo] : []);
        return (
          <div className="voile" onClick={() => setEditionId(null)}>
            <div className="panneau" onClick={(e) => e.stopPropagation()}>
              <button className="fermer" onClick={() => setEditionId(null)}>✕</button>
              <div className="panneau-corps">
                <h2 className="panneau-nom">Modifier {art.ref}</h2>
                <Champ label="Titre" value={editForm.nom} onChange={(e) => setEditForm({ ...editForm, nom: e.target.value })} />
                <Champ label="Dimensions affichées" value={editForm.dims} onChange={(e) => setEditForm({ ...editForm, dims: e.target.value })} />
                <Champ label="Prix" suffixe="€" type="number" inputMode="decimal" step="0.10" value={editForm.prix}
                  onChange={(e) => setEditForm({ ...editForm, prix: e.target.value })} />
                <label className="label">Catégorie</label>
                <div className="choix-grille">
                  {categories.map((cc) => (
                    <button key={cc} className={"choix-case" + (editForm.categorie === cc ? " choisi" : "")}
                      onClick={() => setEditForm({ ...editForm, categorie: cc })}>{cc}</button>
                  ))}
                </div>
                <label className="label">Photos (modifications immédiates)</label>
                <div className="photos-rangee">
                  {photos.map((ph, i) => (
                    <div key={i} className="photo-vignette">
                      <img src={ph} alt="" />
                      <span className="photo-poids">{tailleKo(ph)} Ko</span>
                      <button className="photo-retirer" onClick={() => retirerPhoto(art, i)} aria-label="Retirer">✕</button>
                    </div>
                  ))}
                  {photos.length < 4 && (
                    <label className="photo-bouton">📷 + Vue
                      <input type="file" accept="image/*" capture="environment" className="photo-input"
                        onChange={(e) => {
                          const f = e.target.files && e.target.files[0];
                          if (f) ouvrirRecadrage(art, f);
                          e.target.value = "";
                        }} />
                    </label>
                  )}
                </div>
                <button className="btn-principal" onClick={() => {
                  db.collection("articles").doc(art.id).update({
                    nom: editForm.nom.trim() || art.nom,
                    dims: editForm.dims.trim() || "—",
                    prix: +editForm.prix || art.prix,
                    categorie: editForm.categorie || art.categorie,
                  }).then(() => { montrerToast(art.ref + " modifié"); setEditionId(null); })
                    .catch((e) => montrerToast("Erreur : " + e.message));
                }}>Enregistrer les modifications</button>
              </div>
            </div>
          </div>
        );
      })()}

      {/* ================= CADRAGE PHOTO ================= */}
      {recadrage && (() => {
        const S = 300;
        const echelle = (S / Math.min(recadrage.w, recadrage.h)) * recadrage.zoom;
        const dw = recadrage.w * echelle, dh = recadrage.h * echelle;
        const x = recadrage.x === null ? (S - dw) / 2 : recadrage.x;
        const y = recadrage.y === null ? (S - dh) / 2 : recadrage.y;
        const borne = (v, min) => Math.min(0, Math.max(min, v));
        return (
          <div className="voile">
            <div className="panneau" onClick={(e) => e.stopPropagation()}>
              <div className="panneau-corps">
                <h2 className="panneau-nom">Cadrer la photo</h2>
                <p className="aide">Déplacez la photo avec le doigt, zoomez avec le curseur — ou gardez l’image entière sur fond blanc.</p>
                <div className="recadrage-zone"
                  onPointerDown={(e) => {
                    glisser.current = { sx: e.clientX, sy: e.clientY, ox: x, oy: y };
                    e.currentTarget.setPointerCapture(e.pointerId);
                  }}
                  onPointerMove={(e) => {
                    if (!glisser.current) return;
                    setRecadrage({ ...recadrage,
                      x: borne(glisser.current.ox + e.clientX - glisser.current.sx, S - dw),
                      y: borne(glisser.current.oy + e.clientY - glisser.current.sy, S - dh) });
                  }}
                  onPointerUp={() => { glisser.current = null; }}>
                  <img src={recadrage.src} alt="" style={{ width: dw, height: dh, left: x, top: y }} draggable={false} />
                </div>
                <label className="label">Zoom</label>
                <input type="range" min="1" max="3" step="0.01" value={recadrage.zoom} className="curseur"
                  onChange={(e) => {
                    const z2 = +e.target.value;
                    const base = S / Math.min(recadrage.w, recadrage.h);
                    const dw2 = recadrage.w * base * z2, dh2 = recadrage.h * base * z2;
                    const rapport = z2 / recadrage.zoom;
                    setRecadrage({ ...recadrage, zoom: z2,
                      x: borne(S / 2 - (S / 2 - x) * rapport, S - dw2),
                      y: borne(S / 2 - (S / 2 - y) * rapport, S - dh2) });
                  }} />
                <div className="resa-actions">
                  <button className="btn-secondaire mini-btn" onClick={() => { URL.revokeObjectURL(recadrage.src); setRecadrage(null); }}>Annuler</button>
                  <button className="btn-secondaire mini-btn" onClick={() => validerRecadrage(true)}>Image entière</button>
                  <button className="btn-principal petit" onClick={() => validerRecadrage(false)}>Valider ce cadrage</button>
                </div>
              </div>
            </div>
          </div>
        );
      })()}

      {/* ================= MENTIONS LÉGALES ================= */}
      {mentionsOuvertes && (
        <div className="voile" onClick={() => setMentionsOuvertes(false)}>
          <div className="panneau" onClick={(e) => e.stopPropagation()}>
            <button className="fermer" onClick={() => setMentionsOuvertes(false)}>✕</button>
            <div className="panneau-corps mentions">
              <h2 className="panneau-nom">Mentions légales</h2>
              <p><strong>Éditeur du site</strong><br />
                Nath Point Brod — [PRÉNOM NOM DE TA MÈRE], entrepreneure individuelle<br />
                Atelier : Rossillon (01510) · Point de vente : Belley (01300)<br />
                SIRET : [NUMÉRO SIRET]<br />
                Contact : [EMAIL DE CONTACT] · [TÉLÉPHONE — facultatif]</p>
              <p><strong>Directrice de la publication</strong> : [PRÉNOM NOM DE TA MÈRE]</p>
              <p><strong>Hébergement</strong><br />
                Site : GitHub Inc., 88 Colin P. Kelly Jr St, San Francisco, CA 94107, États-Unis (GitHub Pages)<br />
                Données : Google Ireland Limited, Gordon House, Barrow Street, Dublin 4, Irlande (Firebase — données hébergées en région Paris, europe-west9)</p>

              <h2 className="panneau-nom" style={{ marginTop: 18 }}>Politique de confidentialité</h2>
              <p><strong>Données collectées.</strong> Lors d’une réservation, nous recueillons : nom, prénom, téléphone, adresse email, lieu de retrait choisi et, si vous l’acceptez, votre consentement à recevoir notre newsletter. Aucune donnée bancaire n’est collectée : le site ne propose pas de paiement en ligne.</p>
              <p><strong>Finalité et base légale.</strong> Ces données servent uniquement à traiter votre réservation et à vous recontacter pour la remise de la pièce (exécution de mesures précontractuelles), et — avec votre consentement explicite — à vous envoyer la newsletter des nouveautés (environ 1 email par mois).</p>
              <p><strong>Destinataires.</strong> Vos données sont accessibles à la seule éditrice du site. Elles ne sont ni vendues, ni transmises à des tiers. Elles sont stockées de façon sécurisée sur Firebase (Google), en Europe.</p>
              <p><strong>Durée de conservation.</strong> Les données de réservation sont supprimées au plus tard 1 an après la remise ou l’annulation. Les données de la newsletter sont conservées jusqu’à votre désinscription, possible à tout moment via le lien présent dans chaque email ou sur simple demande.</p>
              <p><strong>Cookies.</strong> Ce site n’utilise ni cookie publicitaire ni traceur d’audience.</p>
              <p><strong>Vos droits.</strong> Conformément au RGPD, vous disposez d’un droit d’accès, de rectification, d’effacement, d’opposition et de portabilité de vos données. Pour l’exercer : [EMAIL DE CONTACT]. Vous pouvez également adresser une réclamation à la CNIL (www.cnil.fr).</p>
            </div>
          </div>
        </div>
      )}

      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

.pin-ecran { text-align: center; padding-top: 40px; }

.onglet-g.actif { background: var(--bordeaux); border-color: var(--bordeaux); color: #fff; font-weight: 600; }

.acc-ligne { background: var(--carte); border-radius: 12px; padding: 6px 10px; margin-bottom: 7px; display: flex; align-items: center; justify-content: space-between; gap: 8px; box-shadow: 0 1px 3px rgba(109,7,26,0.05); }
.acc-ligne.actif { border: 1.5px solid var(--jaune); }
.acc-nom { border: none; background: none; font-size: 13.5px; color: var(--encre); display: flex; align-items: center; gap: 8px; padding: 8px 0; flex: 1; text-align: left; font-family: 'Poppins', sans-serif; }
.acc-detail { display: block; font-size: 10.5px; color: #8B8082; font-weight: 300; }
.acc-coche { width: 22px; height: 22px; border-radius: 6px; border: 1.5px solid var(--rose); flex: 0 0 22px; display: inline-flex; align-items: center; justify-content: center; font-size: 13px; color: var(--bordeaux); }
.acc-ligne.actif .acc-coche { border-color: var(--bordeaux); background: var(--rose-pale); }
.acc-droite { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
.stepper { display: flex; align-items: center; gap: 2px; }

.sous-total { margin-top: 14px; background: #FDF3C7; border: 1.5px solid var(--jaune); border-radius: 10px; padding: 10px 12px; font-size: 13.5px; }
.info-calc { font-size: 12px; color: #8B8082; margin-top: 10px; line-height: 1.5; }
.recap { background: var(--carte); border-radius: 14px; padding: 6px 14px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(109,7,26,0.07); }

.curseur { width: 100%; accent-color: var(--bordeaux); }

.btn-principal { width: 100%; margin-top: 16px; background: var(--bordeaux); color: #fff; border: none; border-radius: 12px; padding: 15px; font-size: 15px; font-weight: 600; font-family: 'Poppins', sans-serif; }
.btn-principal.petit { width: auto; margin: 0; padding: 12px 18px; font-size: 13px; }
.btn-principal.inactif, .btn-principal:disabled { opacity: 0.45; }
.btn-secondaire { background: transparent; border: 1.5px solid var(--rose); color: var(--encre); border-radius: 12px; padding: 12px 18px; font-size: 13.5px; font-family: 'Poppins', sans-serif; }
.mini-btn { padding: 9px 12px; font-size: 12px; }
.nav-bas { display: flex; justify-content: space-between; margin-top: 22px; }

.publier-carte { background: var(--carte); border: 2px solid var(--jaune); border-radius: 14px; padding: 12px; margin-bottom: 12px; }
.publier-haut { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
.photo-mini { width: 56px; height: 56px; border-radius: 10px; flex: 0 0 56px; display: flex; align-items: center; justify-content: center; font-size: 24px; overflow: hidden; }
.photo-mini-img { width: 56px; height: 56px; border-radius: 10px; object-fit: cover; flex: 0 0 56px; }
.photo-bouton { width: 56px; height: 56px; flex: 0 0 56px; border: 2px dashed var(--bordeaux); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 10px; color: var(--bordeaux); text-align: center; position: relative; background: var(--carte); }
.photo-input { position: absolute; inset: 0; opacity: 0; width: 100%; height: 100%; }
.ref-badge { display: inline-block; font-family: ui-monospace, monospace; font-size: 10px; letter-spacing: 1px; background: var(--rose-pale); color: var(--bordeaux); border-radius: 5px; padding: 2px 7px; }
.badge-resa { color: var(--bordeaux); font-weight: 600; font-size: 11px; }

.ligne { display: flex; gap: 10px; align-items: center; background: var(--carte); border-radius: 12px; padding: 10px; margin-top: 10px; box-shadow: 0 1px 3px rgba(109,7,26,0.05); }
.ligne.passe { opacity: 0.55; }
.ligne-infos { flex: 1; min-width: 0; }
.ligne-nom { font-weight: 600; font-size: 13px; line-height: 1.35; }
.ligne-detail { font-size: 12px; color: #8B8082; margin-top: 2px; }
.btn-suppr { border: none; background: none; color: #C4B2B7; font-size: 15px; padding: 6px; }
.btn-vendu { background: var(--jaune); color: var(--encre); border: none; border-radius: 999px; padding: 8px 14px; font-size: 12.5px; font-weight: 600; font-family: 'Poppins', sans-serif; }
.canaux { display: flex; flex-direction: column; gap: 4px; }
.canal { border: 1.5px solid var(--bordeaux); background: var(--carte); color: var(--bordeaux); border-radius: 999px; padding: 5px 10px; font-size: 12px; font-weight: 600; font-family: 'Poppins', sans-serif; }

.resa-carte { background: var(--carte); border-left: 4px solid var(--jaune); border-radius: 12px; padding: 12px 14px; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(109,7,26,0.06); }

.resa-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 10px; flex-wrap: wrap; }

.voile { position: fixed; inset: 0; background: rgba(58,50,52,0.5); display: flex; align-items: flex-end; justify-content: center; z-index: 30; }
.panneau { background: var(--fond); border-radius: 18px 18px 0 0; width: 100%; max-width: 430px; max-height: 90vh; overflow-y: auto; position: relative; }
.panneau.confirmation { padding: 28px 20px; text-align: center; border-radius: 18px; margin: 0 16px 26vh; }
.fermer { position: absolute; top: 10px; right: 10px; z-index: 2; width: 34px; height: 34px; border-radius: 50%; border: none; background: rgba(58,50,52,0.55); color: #fff; font-size: 15px; }
.panneau-corps { padding: 16px 18px 26px; }
.panneau-nom { font-size: 17px; font-weight: 600; color: var(--bordeaux); margin: 2px 0 6px; line-height: 1.35; }
.panneau-nom.centre, .panneau-desc.centre { text-align: center; }
.panneau-desc { font-size: 13.5px; color: #6E6366; line-height: 1.5; }
.details { background: var(--carte); border-radius: 12px; padding: 4px 14px; margin: 14px 0; }
.detail-ligne { display: flex; justify-content: space-between; font-size: 13px; padding: 9px 0; border-bottom: 1px solid var(--rose-pale); color: #6E6366; }
.detail-ligne:last-child { border-bottom: none; }
.detail-ligne span:last-child { font-weight: 600; color: var(--encre); }
.panneau-pied { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
.note-resa { font-size: 11px; color: #8B8082; text-align: center; margin-top: 12px; line-height: 1.5; }
.conf-icone { font-size: 46px; color: var(--jaune); }
.encart-duree { margin-top: 14px; background: #FDF3C7; border: 1.5px solid var(--jaune); border-radius: 12px; padding: 11px 13px; font-size: 12px; line-height: 1.55; }
.retraits { display: flex; gap: 8px; }
.retrait { flex: 1; border: 1.5px solid var(--rose); background: var(--carte); border-radius: 12px; padding: 12px 8px; font-size: 12.5px; font-family: 'Poppins', sans-serif; line-height: 1.35; color: var(--encre); }
.retrait.choisi { background: var(--bordeaux); border-color: var(--bordeaux); color: #fff; font-weight: 600; }
.case { display: flex; gap: 10px; align-items: flex-start; margin-top: 14px; font-size: 11.5px; color: #6E6366; line-height: 1.5; }
.case input { width: 18px; height: 18px; accent-color: var(--bordeaux); flex: 0 0 18px; margin-top: 1px; }
.erreur { margin-top: 12px; background: #FDECEC; color: var(--bordeaux); border-radius: 10px; padding: 10px 12px; font-size: 12.5px; font-weight: 600; }
.choix-case.avec-suppr { display: inline-flex; align-items: center; gap: 6px; cursor: pointer; }
.mini-suppr { border: none; background: none; color: inherit; opacity: 0.55; font-size: 11px; padding: 2px; line-height: 1; }
.photos-rangee { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
.photo-vignette { position: relative; width: 64px; height: 64px; }
.photo-vignette img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }
.photo-poids { position: absolute; bottom: 2px; left: 2px; background: rgba(58,50,52,0.72); color: #fff; font-size: 9px; border-radius: 4px; padding: 1px 4px; }
.photo-retirer { position: absolute; top: -6px; right: -6px; width: 18px; height: 18px; border-radius: 50%; border: none; background: var(--bordeaux); color: #fff; font-size: 10px; line-height: 1; }
.fiche-vignettes { display: flex; gap: 8px; padding: 10px 18px 0; flex-wrap: wrap; }
.fiche-vignettes img { width: 54px; height: 54px; object-fit: cover; border-radius: 8px; border: 2px solid transparent; cursor: pointer; }
.fiche-vignettes img.choisi { border-color: var(--bordeaux); }
.btn-edit { border: none; background: none; color: var(--bordeaux); font-size: 16px; padding: 6px; }

/* --- templates réseaux --- */
.tpl-grille { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
.tpl-choix { border: none; background: none; padding: 0; text-align: inherit; }
.tpl-post { aspect-ratio: 1; width: 100%; background: var(--fond); border-radius: 5px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 2px 8px rgba(58,50,52,0.14); position: relative; }
.tpl-post.pointille::before { content: ""; position: absolute; inset: 5px; border: 1.5px dashed var(--bordeaux); opacity: .4; border-radius: 3px; pointer-events: none; z-index: 3; }
.tpl-logo { position: absolute; top: 4px; left: 5px; z-index: 2; font-family: 'Caveat', cursive; font-size: 11px; color: var(--bordeaux); font-weight: 700; background: rgba(255,253,248,0.9); border-radius: 999px; padding: 1px 7px; }
.tpl-logo em { color: var(--jaune); font-style: normal; }
.tpl-souslogo { position: absolute; top: 19px; left: 7px; z-index: 2; font-size: 5px; letter-spacing: 1px; color: var(--bordeaux); background: rgba(255,253,248,0.85); border-radius: 999px; padding: 1px 5px; }
.tpl-photos { flex: 1; display: grid; gap: 3px; padding: 4px 4px 0; min-height: 0; }
.tpl-post.haut .tpl-photos { padding: 0 4px 4px; }
.tpl-photos.g1 { grid-template-columns: 1fr; }
.tpl-photos.g2 { grid-template-columns: 1fr 1fr; }
.tpl-photos.g3 { grid-template-columns: 2fr 1fr; grid-template-rows: 1fr 1fr; }
.tpl-photos.g3 .tpl-ph:first-child { grid-row: 1 / 3; }
.tpl-photos.g4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
.tpl-ph { border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 24px; min-height: 0; overflow: hidden; }
.tpl-photos.g4 .tpl-ph, .tpl-photos.g3 .tpl-ph:not(:first-child) { font-size: 15px; }
.tpl-ph img { width: 100%; height: 100%; object-fit: cover; }
.tpl-tambour-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding-top: 7px; min-height: 0; }
.tpl-tambour { width: 54%; aspect-ratio: 1; border-radius: 50%; border: 5px solid #C89B6A; position: relative; display: flex; background: #fff; box-shadow: inset 0 0 0 2px #B0824F; overflow: hidden; }
.tpl-tambour::after { content: "▮"; position: absolute; top: -3px; left: 50%; transform: translateX(-50%); color: #B0824F; font-size: 9px; }
.tpl-tambour .tpl-ph { width: 100%; height: 100%; border-radius: 0; font-size: 34px; }
.tpl-bandeau { padding: 5px 7px 6px; text-align: center; }
.tpl-bandeau h3 { font-family: 'Caveat', cursive; font-size: 13px; color: var(--bordeaux); line-height: 1; }
.tpl-bandeau p { font-size: 6px; color: #5E5257; line-height: 1.35; margin-top: 1px; }
.tpl-cta { display: inline-block; margin-top: 2px; background: var(--bordeaux); color: #fff; font-size: 5.5px; font-weight: 600; border-radius: 999px; padding: 2px 6px; }
.tpl-post.superpose .tpl-bandeau { position: absolute; bottom: 0; left: 0; right: 0; z-index: 2; }
.tpl-post.superpose .tpl-photos { position: absolute; inset: 0; padding: 0; }
.tpl-post.superpose .tpl-ph { border-radius: 0; }
.tpl-editeur { max-width: 340px; margin: 0 auto 6px; }
.tpl-post.grand .tpl-logo { font-size: 17px; padding: 2px 10px; top: 8px; left: 9px; }
.tpl-post.grand .tpl-souslogo { font-size: 7px; top: 32px; left: 11px; }
.tpl-post.grand .tpl-bandeau { padding: 10px 12px 12px; }
.tpl-post.grand .tpl-bandeau h3 { font-size: 25px; }
.tpl-post.grand .tpl-bandeau p { font-size: 10.5px; }
.tpl-post.grand .tpl-cta { font-size: 9.5px; padding: 4px 11px; margin-top: 4px; }
.tpl-post.grand .tpl-ph { font-size: 42px; }
.tpl-post.grand .tpl-photos.g4 .tpl-ph, .tpl-post.grand .tpl-photos.g3 .tpl-ph:not(:first-child) { font-size: 26px; }
textarea.champ { resize: vertical; font-family: 'Poppins', sans-serif; }
.recadrage-zone {
  width: 300px; height: 300px; position: relative; overflow: hidden; border-radius: 12px;
  margin: 0 auto; background: #EDE8E9; touch-action: none; cursor: grab;
}
.recadrage-zone img { position: absolute; max-width: none; user-select: none; pointer-events: none; }
.lien-mentions { border: none; background: none; color: #8B8082; font-size: 11px; text-decoration: underline; padding: 4px 0 0; font-family: 'Poppins', sans-serif; }
.mentions p { font-size: 12px; color: #55504A; line-height: 1.6; margin-bottom: 10px; }
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--bordeaux); color: #fff; font-size: 13px; padding: 10px 16px; border-radius: 999px; z-index: 40; white-space: nowrap; }

@media (min-width: 700px) {
  .app { max-width: 1080px; }
  .grille { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); padding: 0 24px; }
  .bandeau, .marches-bloc { margin-left: 24px; margin-right: 24px; }
  .chips { padding-left: 24px; padding-right: 24px; }
  .contenu, .onglets-g { max-width: 620px; margin-left: auto; margin-right: auto; }
  .voile { align-items: center; }
  .panneau { border-radius: 18px; max-width: 480px; }
  .photo.grande { max-height: 380px; }
}
@media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
